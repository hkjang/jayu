name: ci

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
      - run: uv python install 3.12
      - run: uv sync --extra dev --frozen
      - run: uv run ruff format --check src tests scripts
      - run: uv run ruff check src tests scripts danta_simulation.py stock_kakao.py
      - run: uv run mypy src/jayu
      - run: uv run bandit -q -r src/jayu -x src/jayu/engine.py
      - run: uv run python scripts/generate_docs.py --check
      - run: uv run pytest -q
      - run: uv run pip-audit
      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
      - run: go test ./...
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo test --manifest-path rust/jayu-core/Cargo.toml
