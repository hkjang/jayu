name: ci

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
      - run: uv python install 3.12
      - run: uv sync --extra dev --frozen
      - run: uv run ruff format --check src tests scripts
      - run: uv run ruff check src tests scripts danta_simulation.py stock_kakao.py build_portfolio.py analyze_portfolio.py
      - run: uv run mypy src/jayu
      - run: uv run bandit -q -r src/jayu
      - run: uv run python scripts/generate_docs.py --check
      - name: validate safe sample config
        env:
          JAYU_TIINGO_API_KEY: ci-placeholder # pragma: allowlist secret
        run: uv run jayu validate-config --config configs/config.sample.json --mode shadow
      - run: uv run pytest -q
      - name: coverage gate (fail_under in pyproject [tool.coverage])
        run: uv run pytest --cov=jayu
      - run: uv run pip-audit
      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
      - run: go test ./...
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo test --manifest-path rust/jayu-core/Cargo.toml
      - name: docker build smoke
        run: docker build -t jayu-ci .
      - name: docker runtime smoke
        run: docker run --rm jayu-ci --help
      - name: docker non-root identity
        run: docker run --rm --entrypoint sh jayu-ci -c 'test "$(id -u)" = "10001"'
      - name: docker read-only runtime smoke
        run: docker run --rm --read-only --tmpfs /tmp jayu-ci --help
