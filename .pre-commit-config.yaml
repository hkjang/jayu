repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.14.10
    hooks:
      - id: ruff-check
        args: [--fix]
        files: ^(src/|tests/|scripts/|danta_simulation\.py$|stock_kakao\.py$)
      - id: ruff-format
        files: ^(src/|tests/|scripts/|danta_simulation\.py$|stock_kakao\.py$)
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: check-json
      - id: check-toml
      - id: detect-private-key
      - id: end-of-file-fixer
      - id: trailing-whitespace
  - repo: https://github.com/Yelp/detect-secrets
    rev: v1.5.0
    hooks:
      - id: detect-secrets
  - repo: local
    hooks:
      - id: generated-docs
        name: generated docs are current
        entry: uv run python scripts/generate_docs.py --check
        language: system
        pass_filenames: false
      - id: mypy
        name: mypy
        entry: uv run mypy src/jayu
        language: system
        pass_filenames: false
      - id: bandit
        name: bandit
        entry: uv run bandit -q -r src/jayu -x src/jayu/engine.py
        language: system
        pass_filenames: false
      - id: gofmt
        name: gofmt
        entry: gofmt -w
        language: system
        files: \.go$
      - id: go-test
        name: go test
        entry: go test ./...
        language: system
        pass_filenames: false
